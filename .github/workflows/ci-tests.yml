name: CI Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
      HOME: /tmp/isaac-ci-home
      TZ: America/Chicago
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn', '**/bb.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Cache ripgrep binary
        id: cache-rg
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/rg
          key: ripgrep-14.1.0-musl-${{ runner.os }}

      - name: Install ripgrep
        if: steps.cache-rg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-x86_64-unknown-linux-musl.tar.gz \
            | tar xz --strip-components=1 -C ~/.local/bin ripgrep-14.1.0-x86_64-unknown-linux-musl/rg
          chmod +x ~/.local/bin/rg

      - name: Add ripgrep to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare isolated home
        run: mkdir -p /tmp/isaac-ci-home

      - name: Verify ripgrep
        run: rg --version

      - name: Run bb ci
        run: |
          set -o pipefail
          run_once () {
            bb spec 2>&1 | tee /tmp/isaac-spec.log
            r=${PIPESTATUS[0]}
            if [ "$r" -ne 0 ]; then
              echo "::error::bb spec failed (exit $r)"
              tail -80 /tmp/isaac-spec.log
              return "$r"
            fi
            bb features 2>&1 | tee /tmp/isaac-features.log
            r=${PIPESTATUS[0]}
            if [ "$r" -ne 0 ]; then
              echo "::error::bb features failed (exit $r)"
              grep -E "^(Failures:|Finished|[0-9]+\\) )" /tmp/isaac-features.log | tail -40
              return "$r"
            fi
            return 0
          }
          for attempt in 1 2; do
            echo "::group::bb ci attempt ${attempt}"
            if run_once; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt ${attempt} failed"
            if [ "$attempt" -lt 2 ]; then
              bb clean || true
            fi
          done
          exit 1
