name: CI Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
      HOME: /tmp/isaac-ci-home
      TZ: America/Chicago
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn', '**/bb.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Cache ripgrep binary
        id: cache-rg
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/rg
          key: ripgrep-14.1.0-gnu-${{ runner.os }}

      - name: Install ripgrep
        if: steps.cache-rg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz --strip-components=1 -C ~/.local/bin ripgrep-14.1.0-x86_64-unknown-linux-gnu/rg
          chmod +x ~/.local/bin/rg

      - name: Add ripgrep to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare isolated home
        run: mkdir -p /tmp/isaac-ci-home

      - name: Run bb ci
        run: |
          set -o pipefail
          for attempt in 1 2; do
            echo "::group::bb ci attempt ${attempt}"
            if bb ci 2>&1 | tee /tmp/isaac-ci.log; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt ${attempt} failed"
            if [ "$attempt" -lt 2 ]; then
              bb clean || true
            fi
          done
          echo "::group::CI failure tail"
          tail -200 /tmp/isaac-ci.log
          echo "::endgroup::"
          exit 1
