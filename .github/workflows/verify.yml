name: verify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
          cli: latest

      - name: Install bd
        run: |
          curl -sSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Run bb verify
        id: verify
        shell: bash
        run: |
          set +e
          bb verify 2>&1 | tee verify.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Configure beads credentials
        if: steps.verify.outputs.status != '0'
        env:
          BEADS_CREDENTIAL_KEY: ${{ secrets.BEADS_CREDENTIAL_KEY }}
        run: |
          test -n "$BEADS_CREDENTIAL_KEY"
          printf '%s' "$BEADS_CREDENTIAL_KEY" > .beads/.beads-credential-key
          chmod 600 .beads/.beads-credential-key

      - name: File bug bead for red CI
        if: steps.verify.outputs.status != '0'
        env:
          BEADS_ACTOR: github-actions[bot]
        run: .github/scripts/create-ci-bug-bead.sh verify.log

      - name: Note bead-based notification path
        if: steps.verify.outputs.status != '0'
        run: echo "CI filed a beads bug instead of failing the workflow to avoid failure notifications."
