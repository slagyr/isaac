name: verify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn', '**/bb.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Cache ripgrep binary
        id: cache-rg
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/rg
          key: ripgrep-14.1.0-${{ runner.os }}

      - name: Install ripgrep
        if: steps.cache-rg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-x86_64-unknown-linux-musl.tar.gz \
            | tar xz --strip-components=1 -C ~/.local/bin ripgrep-14.1.0-x86_64-unknown-linux-musl/rg
          chmod +x ~/.local/bin/rg

      - name: Add ripgrep to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run bb verify
        run: bb ci
