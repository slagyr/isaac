name: verify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
          cli: latest

      - name: Install bd
        run: |
          curl -sSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install Dolt CLI
        run: |
          curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash

      - name: Run bb verify
        id: verify
        shell: bash
        run: |
          set +e
          (bb spec && bb features --tags=~@wip) 2>&1 | tee verify.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install Dolt credentials
        if: steps.verify.outputs.status != '0'
        env:
          DOLT_CREDS_JWK: ${{ secrets.DOLT_CREDS_JWK }}
        run: |
          test -n "$DOLT_CREDS_JWK"
          mkdir -p "$HOME/.dolt/creds"
          key_id="3kgje17nka0h229d3m254tr3gogp32bqjo9tapi35nlpi"
          printf '%s' "$DOLT_CREDS_JWK" > "$HOME/.dolt/creds/${key_id}.jwk"
          chmod 600 "$HOME/.dolt/creds/${key_id}.jwk"
          dolt creds use "$key_id"

      - name: Bootstrap beads workspace from remote
        if: steps.verify.outputs.status != '0'
        run: |
          bd init --non-interactive --quiet
          bd dolt remote add origin https://doltremoteapi.dolthub.com/slagyr/isaac-beads || true
          bd dolt pull

      - name: File bug bead for red CI
        if: steps.verify.outputs.status != '0'
        env:
          BEADS_ACTOR: github-actions[bot]
        run: .github/scripts/create-ci-bug-bead.sh verify.log

      - name: Note bead-based notification path
        if: steps.verify.outputs.status != '0'
        run: echo "CI filed a beads bug instead of failing the workflow to avoid failure notifications."
